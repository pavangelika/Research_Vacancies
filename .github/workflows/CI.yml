name: CI Safe Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  safe-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run external API gate tests
        run: pytest tests/test_external_api_gate.py -q

      - name: Run backend tests
        run: pytest tests/backend -q

      - name: Run UI JS regression tests
        shell: pwsh
        run: ./scripts/test_local.ps1 ui
