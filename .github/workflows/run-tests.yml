name: External HH API Suite

on:
  workflow_dispatch:

jobs:
  external-api:
    runs-on: ubuntu-latest
    env:
      RUN_EXTERNAL_API_TESTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run external HH API tests
        run: pytest tests/api -q
